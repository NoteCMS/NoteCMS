services:
  mongo:
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      MONGO_URI: mongodb://mongo:27017/notecms
      API_PORT: 4000
      ASSET_LOCAL_ROOT: /data/assets
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - api_assets:/data/assets
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --header='content-type: application/json' --post-data='{\"query\":\"{__typename}\"}' http://localhost:4000/graphql >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"
    environment:
      NOTECMS_GRAPHQL_PORT: "4000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
  api_assets:
